<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head}"></head>

<body class="login-body">

    <div class="card login-card" style="width: 100%; max-width: 420px;">
        <div class="login-header text-center text-white">
            <h2 class="mb-1 fw-bold"><i class="bi bi-mortarboard-fill me-2"></i>SMS</h2>
            <p class="mb-0 opacity-75">Student Management System</p>
        </div>

        <div class="card-body p-4 p-md-5">
            <h4 class="text-center mb-4 fw-bold text-dark">Create Account</h4>

            <div th:if="${message}" class="alert alert-danger text-center"
                 role="alert" th:text="${message}"></div>

            <form th:action="@{/register}" method="post">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">USERNAME</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0">
                            <i class="bi bi-person text-muted"></i>
                        </span>
                        <input type="text"
                               class="form-control border-start-0 ps-0"
                               name="username"
                               placeholder="Enter username"
                               required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0">
                            <i class="bi bi-lock text-muted"></i>
                        </span>
                        <input type="password"
                               class="form-control border-start-0 ps-0"
                               name="password"
                               placeholder="Enter password"
                               required>
                    </div>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary py-2 fs-6">
                        Register
                    </button>
                </div>

                <div class="text-center">
                    <a th:href="@{/login}" class="text-decoration-none">
                        Already have an account? Login
                    </a>
                </div>

            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
